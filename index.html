<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Noise Animator</title>
  <style>
    :root {
      --bg:      #0d0d0f;
      --surface: #16161a;
      --border:  #252530;
      --accent:  #6c8ef5;
      --text:    #dde0f0;
      --muted:   #66668a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 22px 24px;
      font-size: 13px;
      line-height: 1.5;
    }

    header { margin-bottom: 18px; }
    header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.02em; }
    header p  { color: var(--muted); font-size: 0.82rem; margin-top: 3px; }

    .layout {
      display: grid;
      grid-template-columns: 264px 1fr;
      gap: 14px;
      align-items: start;
    }
    /* デスクトップ: 左列に各カードを積み、preview は右列全体 */
    .upload-card,
    .grid-card,
    .fx-card,
    .ctrl-card,
    .out-card    { grid-column: 1; }
    .preview-pane { grid-column: 2; grid-row: 1 / 99; }

    @media (max-width: 680px) {
      body { padding: 10px 12px; }

      .layout { grid-template-columns: 1fr; }

      /* 全カードの grid 配置をリセットして order で並べ直す */
      .upload-card,
      .grid-card,
      .fx-card,
      .ctrl-card,
      .out-card,
      .preview-pane { grid-column: auto; grid-row: auto; }

      /* モバイル順: 画像選択 → プレビュー → 再生制御 → グリッド → エフェクト → 出力 */
      .upload-card  { order: 1; }
      .preview-pane { order: 2; min-height: 200px; }
      .ctrl-card    { order: 3; }
      .grid-card    { order: 4; }
      .fx-card      { order: 5; }
      .out-card     { order: 6; }

      #mainCanvas   { max-height: 48vh; }

      /* タッチターゲットを広げる */
      .btn { padding: 11px 14px; font-size: 0.88rem; min-height: 44px; }
      input[type=range] { height: 28px; }
      input[type=number],
      select { font-size: 1rem; padding: 6px 8px; }

      /* num-row が狭い画面でも折り返せるように */
      .num-row { flex-wrap: wrap; }
      .num-row label { min-width: 80px; }
      input[type=number] { width: 72px; }

      /* ML保護チェックボックスのラベルを大きく */
      #mlGuard { width: 18px; height: 18px; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
    }
    .card-title {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* ── Drop zone ── */
    .dz {
      border: 1.5px dashed var(--border);
      border-radius: 7px;
      cursor: pointer;
      overflow: hidden;
      transition: border-color 0.15s, background 0.15s;
    }
    .dz:hover { border-color: var(--accent); }
    .dz.over  { border-color: var(--accent); background: rgba(108,142,245,0.06); }
    .dz input { display: none; }
    .dz-thumb {
      width: 100%; height: clamp(48px, 12vw, 80px);
      object-fit: cover;
      display: none;
      border-bottom: 1px solid var(--border);
    }
    .dz-inner { padding: 14px; text-align: center; color: var(--muted); font-size: 0.8rem; }
    .dz-name  {
      font-size: 0.75rem; color: var(--text);
      margin-top: 4px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      display: none;
    }

    /* ── Sliders ── */
    .field { margin-bottom: 9px; }
    .field:last-child { margin-bottom: 0; }
    .field-label {
      display: flex; justify-content: space-between;
      color: var(--muted); font-size: 0.78rem;
      margin-bottom: 4px;
    }
    .field-label em { font-style: normal; color: var(--text); }
    input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }

    /* ── Number inputs ── */
    .num-row { display: flex; align-items: center; gap: 7px; margin-bottom: 8px; }
    .num-row span { color: var(--muted); font-size: 0.78rem; }
    .num-row label { min-width: 64px; color: var(--muted); font-size: 0.78rem; }
    input[type=number] {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 5px;
      padding: 4px 7px;
      width: 64px;
      font-size: 0.82rem;
    }
    input[type=number]:focus { outline: none; border-color: var(--accent); }

    /* ── Buttons ── */
    .btn {
      border: none; border-radius: 6px;
      padding: 7px 13px;
      cursor: pointer; font-size: 0.82rem; font-weight: 600;
      transition: filter 0.12s, opacity 0.12s;
    }
    .btn:hover:not(:disabled) { filter: brightness(1.18); }
    .btn:disabled { opacity: 0.3; cursor: default; }
    .btn-blue { background: var(--accent); color: #fff; }
    .btn-gray { background: var(--border); color: var(--text); }
    .btn-full { width: 100%; margin-top: 2px; }
    .btn-row  { display: flex; gap: 7px; }

    /* ── Progress ── */
    .progress { height: 3px; background: var(--border); border-radius: 2px; margin-top: 7px; display: none; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.07s linear; }
    .status { color: var(--muted); font-size: 0.76rem; margin-top: 6px; min-height: 1.4em; }

    /* ── Preview pane ── */
    .preview-pane {
      background: #000;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      min-height: clamp(200px, 55vw, 420px);
      position: relative;
    }
    #mainCanvas {
      display: none;
      max-width: 100%; max-height: 76vh;
      image-rendering: pixelated;
    }
    .preview-empty { color: var(--muted); font-size: 0.85rem; }

    .badge {
      position: absolute; top: 10px; right: 10px;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.06em;
      padding: 3px 9px; border-radius: 4px;
      display: none;
    }
    .badge.playing   { background: rgba(0,0,0,0.65); color: #aac; backdrop-filter: blur(4px); }
    .badge.recording { background: rgba(200,40,40,0.85); color: #fff; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .badge.recording { animation: blink 1s ease-in-out infinite; }

    select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 5px;
      padding: 4px 7px;
      font-size: 0.82rem;
      cursor: pointer;
      flex: 1;
    }
    select:focus { outline: none; border-color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <h1>Grid Noise Animator</h1>
    <p>画像をチカチカさせるツールです。</p>
  </header>

  <div class="layout">
    <div class="card upload-card">
      <div class="card-title">画像を選択</div>
      <div class="dz" id="dz">
        <input type="file" id="fileIn" accept="image/*">
        <img id="dzThumb" class="dz-thumb" alt="">
        <div class="dz-inner">
          <div>クリックまたはドラッグ&amp;ドロップ</div>
          <div class="dz-name" id="dzName"></div>
        </div>
      </div>
    </div><!-- /upload-card -->

    <div class="card grid-card">
      <div class="card-title">グリッド設定</div>
      <div class="num-row">
        <label>分割数</label>
        <select id="gridSel">
          <option value="16">16 × 16</option>
          <option value="32" selected>32 × 32</option>
          <option value="64">64 × 64</option>
          <option value="128">128 × 128</option>
        </select>
      </div>
    </div>

    <div class="card fx-card">
      <div class="card-title">エフェクト設定</div>
      <div class="field">
        <div class="field-label">色相の変動幅 <em id="hueV">± 120°</em></div>
        <input type="range" id="hueS" min="0" max="180" value="120">
      </div>
      <div class="field">
        <div class="field-label">明度の変動幅 <em id="litV">± 40%</em></div>
        <input type="range" id="litS" min="0" max="50" value="40">
      </div>
      <div class="field">
        <div class="field-label">彩度の変動幅 <em id="satV">± 30%</em></div>
        <input type="range" id="satS" min="0" max="50" value="30">
      </div>
      <div class="field" style="margin-top:4px">
        <div class="field-label">
          <span>ぼかし <em id="blurV">4px</em></span>
          <label style="display:flex;align-items:center;gap:4px;cursor:pointer;font-size:0.78rem;color:var(--muted)">
            <input type="checkbox" id="blurChk" style="width:13px;height:13px">ON
          </label>
        </div>
        <input type="range" id="blurS" min="1" max="20" value="4">
      </div>
      <div class="field" style="margin-top:10px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px">
          <input type="checkbox" id="mlGuard" checked style="width:14px;height:14px">
          <span>ML学習保護（高周波パターン重畳）</span>
        </label>
        <div style="font-size:11px;color:#888;margin-top:4px;line-height:1.4">
          フレーム平均後も残る固定パターンを埋め込みます。人間には不可視ですがAI特徴抽出を乱します。
        </div>
      </div>
    </div>

    <div class="card ctrl-card">
      <div class="card-title">プレビュー制御</div>
      <div class="num-row" style="margin-bottom:10px">
        <label>FPS</label>
        <input type="number" id="previewFps" value="60" min="1" max="240">
        <span>fps</span>
      </div>
      <div class="btn-row">
        <button class="btn btn-blue" id="playBtn"  disabled>▶ 再生</button>
        <button class="btn btn-gray" id="pauseBtn" disabled>■ 停止</button>
      </div>
    </div>

    <div class="card out-card">
      <div class="card-title">動画として出力</div>
      <div class="num-row">
        <label>フレームレート</label>
        <input type="number" id="fpsIn" value="60" min="1" max="60">
        <span>fps</span>
      </div>
      <div class="num-row">
        <label>録画時間</label>
        <input type="number" id="durIn" value="5"  min="1" max="120">
        <span>秒</span>
      </div>
      <div class="num-row">
        <label>出力形式</label>
        <select id="formatSel">
          <option value="webm">WebM (VP9)</option>
          <option value="gif" selected>GIF アニメ</option>
        </select>
      </div>
      <button class="btn btn-blue btn-full" id="expBtn" disabled>動画を出力</button>
      <div class="progress" id="prog">
        <div class="progress-fill" id="progFill"></div>
      </div>
      <div class="status" id="st">画像を読み込んでください</div>
    </div>


    <div class="preview-pane">
      <span class="preview-empty" id="emptyMsg">画像を読み込むとここに表示されます</span>
      <canvas id="mainCanvas"></canvas>
      <div class="badge" id="badge"></div>
    </div>
  </div><!-- /layout -->

<script>
// ── GIF Encoder (self-contained, no external dependencies) ──────────────────
const GIF_PALETTE = (() => {
  const p = new Uint8Array(256 * 3);
  let i = 0;
  for (let r = 0; r < 6; r++) for (let g = 0; g < 6; g++) for (let b = 0; b < 6; b++) {
    p[i++] = r * 51; p[i++] = g * 51; p[i++] = b * 51;  // 6×6×6 = 216 colors
  }
  for (let k = 0; k < 40; k++) {                         // + 40 grayscale shades
    const v = Math.round(k * 255 / 39);
    p[i++] = v; p[i++] = v; p[i++] = v;
  }
  return p;
})();

let _gifLut = null;  // 5-bit RGB → palette index, built lazily
function getGifLut() {
  if (_gifLut) return _gifLut;
  _gifLut = new Uint8Array(32768);
  for (let r5 = 0; r5 < 32; r5++) for (let g5 = 0; g5 < 32; g5++) for (let b5 = 0; b5 < 32; b5++) {
    let best = 0, bestD = Infinity;
    const r = r5 << 3, g = g5 << 3, b = b5 << 3;
    for (let p = 0; p < 256; p++) {
      const dr = r - GIF_PALETTE[p*3], dg = g - GIF_PALETTE[p*3+1], db = b - GIF_PALETTE[p*3+2];
      const d = dr*dr + dg*dg + db*db;
      if (d < bestD) { bestD = d; best = p; }
    }
    _gifLut[(r5 << 10) | (g5 << 5) | b5] = best;
  }
  return _gifLut;
}

function quantizeToGif(rgba) {
  const lut = getGifLut();
  const n = rgba.length >> 2;
  const idx = new Uint8Array(n);
  for (let i = 0; i < n; i++)
    idx[i] = lut[((rgba[i*4] >> 3) << 10) | ((rgba[i*4+1] >> 3) << 5) | (rgba[i*4+2] >> 3)];
  return idx;
}

function lzwEncode(indices) {
  const MIN = 8, CLEAR = 256, EOF = 257;
  const out = []; let buf = 0, bufLen = 0;
  function emit(code, bits) {
    buf |= code << bufLen; bufLen += bits;
    while (bufLen >= 8) { out.push(buf & 0xFF); buf >>= 8; bufLen -= 8; }
  }
  let codeSize = 9, limit = 512, next = 258;
  const table = new Map();
  function reset() { table.clear(); codeSize = 9; limit = 512; next = 258; }
  reset();
  emit(CLEAR, codeSize);
  let prefix = indices[0];
  for (let i = 1; i < indices.length; i++) {
    const px = indices[i];
    const key = (prefix << 8) | px;  // unique: px is always 0-255
    if (table.has(key)) {
      prefix = table.get(key);
    } else {
      emit(prefix, codeSize);
      if (next < 4096) {
        table.set(key, next++);
        if (next > limit && codeSize < 12) { codeSize++; limit <<= 1; }
      } else {
        emit(CLEAR, codeSize); reset();
      }
      prefix = px;
    }
  }
  emit(prefix, codeSize); emit(EOF, codeSize);
  if (bufLen > 0) out.push(buf & 0xFF);
  return new Uint8Array(out);
}

function buildGIF(w, h, frames, delayCs) {
  const parts = [];
  const B = (...v) => parts.push(new Uint8Array(v));
  const W = n => [n & 0xFF, n >> 8 & 0xFF];

  B(...[...'GIF89a'].map(c => c.charCodeAt(0)),
    ...W(w), ...W(h), 0xF7, 0, 0);  // header + screen descriptor (256-color global palette)
  parts.push(GIF_PALETTE);
  B(0x21, 0xFF, 0x0B,
    ...[...'NETSCAPE2.0'].map(c => c.charCodeAt(0)),
    3, 1, 0, 0, 0);  // loop forever

  for (const idx of frames) {
    B(0x21, 0xF9, 4, 0, ...W(delayCs), 0, 0);   // graphic control
    B(0x2C, ...W(0), ...W(0), ...W(w), ...W(h), 0); // image descriptor
    B(8);                                            // min code size = 8
    const cmp = lzwEncode(idx);
    const sub = [];
    for (let p = 0; p < cmp.length; p += 255) {
      const len = Math.min(255, cmp.length - p);
      sub.push(len);
      for (let j = 0; j < len; j++) sub.push(cmp[p + j]);
    }
    sub.push(0);
    parts.push(new Uint8Array(sub));
  }
  B(0x3B);  // trailer

  const total = parts.reduce((s, p) => s + p.length, 0);
  const out = new Uint8Array(total);
  let off = 0;
  for (const p of parts) { out.set(p, off); off += p.length; }
  return out;
}
// ── End GIF Encoder ─────────────────────────────────────────────────────────

(function () {
  'use strict';

  let COLS = 32, ROWS = 32;
  const MAX_W = 640;  // display cap (pixels per second budget)

  // ── DOM refs ─────────────────────────────────────────────────────────────
  const dz       = document.getElementById('dz');
  const fileIn   = document.getElementById('fileIn');
  const dzThumb  = document.getElementById('dzThumb');
  const dzName   = document.getElementById('dzName');
  const playBtn  = document.getElementById('playBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const expBtn   = document.getElementById('expBtn');
  const stEl     = document.getElementById('st');
  const prog     = document.getElementById('prog');
  const progFill = document.getElementById('progFill');
  const emptyMsg = document.getElementById('emptyMsg');
  const badge    = document.getElementById('badge');
  const canvas   = document.getElementById('mainCanvas');
  const ctx      = canvas.getContext('2d');
  const hueS     = document.getElementById('hueS');
  const litS     = document.getElementById('litS');
  const satS     = document.getElementById('satS');
  const mlGuard  = document.getElementById('mlGuard');
  const blurChk  = document.getElementById('blurChk');
  const blurS    = document.getElementById('blurS');

  blurS.addEventListener('input', () => { document.getElementById('blurV').textContent = blurS.value + 'px'; });

  hueS.addEventListener('input', () => { document.getElementById('hueV').textContent = `± ${hueS.value}°`; });
  litS.addEventListener('input', () => { document.getElementById('litV').textContent = `± ${litS.value}%`; });
  satS.addEventListener('input', () => { document.getElementById('satV').textContent = `± ${satS.value}%`; });

  document.getElementById('gridSel').addEventListener('change', () => {
    const n = parseInt(document.getElementById('gridSel').value);
    COLS = n; ROWS = n;
    if (hslBuf) rebuildCellBnds();
  });

  function rebuildCellBnds() {
    const cellW = imgW / COLS, cellH = imgH / ROWS;
    cellBnds = new Array(ROWS * COLS);
    for (let row = 0; row < ROWS; row++) {
      for (let col = 0; col < COLS; col++) {
        const x  = Math.round(col * cellW);
        const y  = Math.round(row * cellH);
        const cw = Math.round((col + 1) * cellW) - x;
        const ch = Math.round((row + 1) * cellH) - y;
        cellBnds[row * COLS + col] = { x, y, cw, ch };
      }
    }
  }

  // ── State ─────────────────────────────────────────────────────────────────
  let hslBuf     = null;  // Float32Array  h0,s0,l0, h1,s1,l1 ... (per pixel)
  let outBuf     = null;  // Uint8ClampedArray RGBA output
  let imgDataObj = null;  // ImageData wrapping outBuf
  let origCanvas = null;  // offscreen canvas holding the scaled original
  let cellBnds   = null;  // [{x,y,cw,ch}] for each of ROWS×COLS cells
  let imgW = 0, imgH = 0;

  let animId      = null;
  let playing     = false;
  let exporting   = false;
  let expInterval = null;

  let fixedOverlay = null;  // Float32Array [r,g,b,...] fixed adversarial pattern per pixel
  let blurOffscreen = null, blurOCtx = null;  // ぼかし用オフスクリーンキャンバス

  // ── Color math ────────────────────────────────────────────────────────────
  function rgbToHsl(r, g, b) {  // r,g,b ∈ [0,1]  →  [h∈[0,360), s∈[0,100], l∈[0,100]]
    const max = r > g ? (r > b ? r : b) : (g > b ? g : b);
    const min = r < g ? (r < b ? r : b) : (g < b ? g : b);
    const l = (max + min) * 0.5;
    if (max === min) return [0, 0, l * 100];
    const d = max - min;
    const s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    let h;
    if      (max === r) h = (g - b) / d + (g < b ? 6 : 0);
    else if (max === g) h = (b - r) / d + 2;
    else                h = (r - g) / d + 4;
    return [h * 60, s * 100, l * 100];
  }

  // ── ML-protection overlay ────────────────────────────────────────────────
  // Generates a fixed high-frequency sinusoidal pattern seeded from the image.
  // - Amplitude ~6/255 (below human JND at normal viewing distance)
  // - Spatial frequency: period 2-5 px → above human CSF cutoff (~30 cpd)
  // - Zero-mean per channel (no DC shift)
  // - Survives temporal frame averaging; disrupts CNN feature maps
  function generateOverlay(pixels, w, h) {
    const overlay = new Float32Array(w * h * 3);

    // Derive a deterministic seed from image content
    let seed = 0x12345678;
    const step = Math.max(1, ((w * h) / 512) | 0);
    for (let i = 0; i < w * h; i += step) {
      seed = Math.imul(seed ^ pixels[i * 4],     0x9e3779b9) | 0;
      seed = Math.imul(seed ^ pixels[i * 4 + 1], 0x6c62272e) | 0;
      seed = Math.imul(seed ^ pixels[i * 4 + 2], 0x517cc1b7) | 0;
    }
    function rand() {
      seed = (Math.imul(seed, 1664525) + 1013904223) | 0;
      return (seed >>> 0) / 0x100000000;
    }

    const AMP = 6;           // total amplitude budget per channel (RGB units)
    const N   = 5;           // sinusoidal components per channel
    const a   = AMP / N;

    for (let ch = 0; ch < 3; ch++) {
      for (let k = 0; k < N; k++) {
        const period = 2 + rand() * 3;          // 2–5 px period (high frequency)
        const freq   = 1 / period;
        const angle  = rand() * Math.PI;        // random orientation
        const phase  = rand() * Math.PI * 2;
        const cx     = Math.cos(angle);
        const cy     = Math.sin(angle);
        const TWO_PI_F = 2 * Math.PI * freq;

        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            overlay[(y * w + x) * 3 + ch] += a * Math.sin(TWO_PI_F * (x * cx + y * cy) + phase);
          }
        }
      }
      // Remove residual DC so spatial mean is exactly zero
      let sum = 0;
      for (let i = ch; i < overlay.length; i += 3) sum += overlay[i];
      const mean = sum / (w * h);
      for (let i = ch; i < overlay.length; i += 3) overlay[i] -= mean;
    }

    return overlay;
  }

  // ── File loading ───────────────────────────────────────────────────────────
  dz.addEventListener('click',    e => { if (!e.target.matches('input')) fileIn.click(); });
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave',e => { if (!dz.contains(e.relatedTarget)) dz.classList.remove('over'); });
  dz.addEventListener('drop',     e => {
    e.preventDefault(); dz.classList.remove('over');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) loadFile(f);
  });
  fileIn.addEventListener('change', () => { if (fileIn.files[0]) loadFile(fileIn.files[0]); });

  function loadFile(file) {
    stopAll();
    setStatus('読み込み中...');
    const reader = new FileReader();
    reader.onload = ev => {
      const url = ev.target.result;
      dzThumb.src = url; dzThumb.style.display = 'block';
      dzName.textContent = file.name; dzName.style.display = 'block';
      const img = new Image();
      img.onload = () => processImage(img, file.name);
      img.src = url;
    };
    reader.readAsDataURL(file);
  }

  // ── Image processing ──────────────────────────────────────────────────────
  function processImage(img, name) {
    let w = img.naturalWidth, h = img.naturalHeight;
    // Scale down if too wide
    if (w > MAX_W) { h = Math.round(h * MAX_W / w); w = MAX_W; }
    // Snap to COLS/ROWS multiples so cells align perfectly
    w = Math.max(COLS, Math.round(w / COLS) * COLS);
    h = Math.max(ROWS, Math.round(h / ROWS) * ROWS);
    imgW = w; imgH = h;

    canvas.width = w; canvas.height = h;

    // Store scaled original in an offscreen canvas
    origCanvas = document.createElement('canvas');
    origCanvas.width = w; origCanvas.height = h;
    const oc = origCanvas.getContext('2d');
    oc.drawImage(img, 0, 0, w, h);

    // Convert every pixel to HSL and store in hslBuf
    const pixels = oc.getImageData(0, 0, w, h).data;
    hslBuf = new Float32Array(w * h * 3);
    for (let i = 0; i < w * h; i++) {
      const [hv, sv, lv] = rgbToHsl(
        pixels[i * 4]     / 255,
        pixels[i * 4 + 1] / 255,
        pixels[i * 4 + 2] / 255
      );
      hslBuf[i * 3]     = hv;
      hslBuf[i * 3 + 1] = sv;
      hslBuf[i * 3 + 2] = lv;
    }

    // Fixed adversarial overlay (image-specific, survives frame averaging)
    fixedOverlay = generateOverlay(pixels, w, h);
    blurOffscreen = document.createElement('canvas');
    blurOffscreen.width = w; blurOffscreen.height = h;
    blurOCtx = blurOffscreen.getContext('2d');

    // Reusable output buffer (alpha always 255)
    outBuf = new Uint8ClampedArray(w * h * 4);
    for (let i = 3; i < outBuf.length; i += 4) outBuf[i] = 255;
    imgDataObj = new ImageData(outBuf, w, h);

    // Pre-compute pixel extents for every cell
    const cellW = w / COLS, cellH = h / ROWS;
    cellBnds = new Array(ROWS * COLS);
    for (let row = 0; row < ROWS; row++) {
      for (let col = 0; col < COLS; col++) {
        const x  = Math.round(col * cellW);
        const y  = Math.round(row * cellH);
        const cw = Math.round((col + 1) * cellW) - x;
        const ch = Math.round((row + 1) * cellH) - y;
        cellBnds[row * COLS + col] = { x, y, cw, ch };
      }
    }

    canvas.style.display = 'block';
    emptyMsg.style.display = 'none';
    drawOriginal();
    playBtn.disabled = false;
    expBtn.disabled  = false;
    setStatus(`読み込み完了: ${name}  (${img.naturalWidth} × ${img.naturalHeight})`);
  }

  // ── Drawing ───────────────────────────────────────────────────────────────
  function drawOriginal() {
    if (origCanvas) ctx.drawImage(origCanvas, 0, 0);
  }

  function drawNoise() {
    if (!hslBuf) return;
    const dH  = +hueS.value;
    const dL  = +litS.value;
    const dS  = +satS.value;
    const w   = imgW;
    const buf = hslBuf;
    const out = outBuf;
    const chromaAmp = dH / 180 * 128;

    for (let ci = 0; ci < ROWS * COLS; ci++) {
      const { x: cx, y: cy, cw, ch } = cellBnds[ci];

      const theta = Math.random() * 6.2831853;
      const cosT  = Math.cos(theta), sinT = Math.sin(theta);
      const ds    = (Math.random() * 2 - 1) * dS;
      const dl    = (Math.random() * 2 - 1) * dL;

      const dR =  chromaAmp *  cosT;
      const dG =  chromaAmp * (-0.5 * cosT - 0.8660254 * sinT);
      const dB =  chromaAmp * (-0.5 * cosT + 0.8660254 * sinT);

      for (let py = cy; py < cy + ch; py++) {
        const rowBase = py * w;
        for (let px = cx; px < cx + cw; px++) {
          const i  = rowBase + px;
          const i3 = i * 3;

          let sv = buf[i3 + 1] + ds;
          if (sv < 0) sv = 0; else if (sv > 100) sv = 100;

          let lv = buf[i3 + 2] + dl;
          if (lv < 0) lv = 0; else if (lv > 100) lv = 100;

          const hv  = buf[i3];
          const sn  = sv / 100, ln = lv / 100;
          const a   = sn * (ln < 0.5 ? ln : 1 - ln);
          const h30 = hv / 30;
          const i4  = i * 4;
          let k, t, u;

          k = h30 % 12;
          t = k - 3; u = 9 - k; if (u < t) t = u; if (t > 1) t = 1; if (t < -1) t = -1;
          let r = (ln - a * t) * 255;

          k = (h30 + 8) % 12;
          t = k - 3; u = 9 - k; if (u < t) t = u; if (t > 1) t = 1; if (t < -1) t = -1;
          let g = (ln - a * t) * 255;

          k = (h30 + 4) % 12;
          t = k - 3; u = 9 - k; if (u < t) t = u; if (t > 1) t = 1; if (t < -1) t = -1;
          let b = (ln - a * t) * 255;

          r += dR; if (r < 0) r = 0; else if (r > 255) r = 255;
          g += dG; if (g < 0) g = 0; else if (g > 255) g = 255;
          b += dB; if (b < 0) b = 0; else if (b > 255) b = 255;

          // Fixed adversarial overlay (persists in temporal average)
          if (mlGuard.checked && fixedOverlay) {
            r += fixedOverlay[i3];     if (r < 0) r = 0; else if (r > 255) r = 255;
            g += fixedOverlay[i3 + 1]; if (g < 0) g = 0; else if (g > 255) g = 255;
            b += fixedOverlay[i3 + 2]; if (b < 0) b = 0; else if (b > 255) b = 255;
          }

          out[i4]     = r + 0.5 | 0;
          out[i4 + 1] = g + 0.5 | 0;
          out[i4 + 2] = b + 0.5 | 0;
        }
      }
    }

    ctx.putImageData(imgDataObj, 0, 0);

    // ぼかし: オフスクリーンにblur付きで描いて主キャンバスに戻す
    if (blurChk.checked && blurOffscreen) {
      blurOCtx.filter = `blur(${blurS.value}px)`;
      blurOCtx.drawImage(canvas, 0, 0);
      ctx.drawImage(blurOffscreen, 0, 0);
    }
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function setStatus(msg) { stEl.textContent = msg; }
  function setBadge(text, cls) {
    badge.className = 'badge ' + (cls || '');
    badge.textContent = text;
    badge.style.display = text ? 'block' : 'none';
  }

  // ── Preview animation ─────────────────────────────────────────────────────
  let lastTs = 0;
  function loop(ts) {
    const fps = Math.max(1, parseInt(document.getElementById('previewFps').value) || 60);
    if (ts - lastTs >= 1000 / fps) { drawNoise(); lastTs = ts; }
    animId = requestAnimationFrame(loop);
  }

  function startPlay() {
    if (playing || exporting || !hslBuf) return;
    playing = true;
    lastTs = 0;
    animId = requestAnimationFrame(loop);
    playBtn.disabled  = true;
    pauseBtn.disabled = false;
    setBadge('▶ 再生中', 'playing');
    setStatus('再生中… 止めると1フレームが見えます');
  }

  function stopPlay() {
    playing = false;
    if (animId) { cancelAnimationFrame(animId); animId = null; }
    playBtn.disabled  = !hslBuf;
    pauseBtn.disabled = true;
    setBadge('');
    setStatus('停止しました（最終フレームを表示）');
  }

  function stopAll() {
    stopPlay();
    if (expInterval) { clearInterval(expInterval); expInterval = null; }
    exporting = false;
    prog.style.display = 'none';
    progFill.style.width = '0%';
    expBtn.disabled = !hslBuf;
  }

  playBtn.addEventListener('click',  startPlay);
  pauseBtn.addEventListener('click', stopPlay);

  // ── Export helpers ────────────────────────────────────────────────────────
  function exportDone(blob, ext, fps, dur) {
    const url = URL.createObjectURL(blob);
    const a   = Object.assign(document.createElement('a'), {
      href: url, download: `grid-noise-${Date.now()}.${ext}`
    });
    document.body.appendChild(a); a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 2000);
    prog.style.display = 'none'; progFill.style.width = '0%';
    setBadge('');
    playBtn.disabled = false; expBtn.disabled = false;
    setStatus(`出力完了  ${(blob.size / 1048576).toFixed(1)} MB  (${fps} fps, ${dur} 秒)`);
  }

  // ── Export ────────────────────────────────────────────────────────────────
  expBtn.addEventListener('click', async () => {
    if (!hslBuf || exporting) return;
    stopPlay();

    const fps   = Math.max(1, parseInt(document.getElementById('fpsIn').value)  || 60);
    const dur   = Math.max(1, Math.min(120, parseInt(document.getElementById('durIn').value) || 5));
    const total = fps * dur;
    const fmt   = document.getElementById('formatSel').value;

    exporting = true;
    playBtn.disabled = true; pauseBtn.disabled = true; expBtn.disabled = true;
    prog.style.display = 'block'; progFill.style.width = '0%';
    setBadge('● REC', 'recording');
    setStatus(`録画中… 0 / ${total} フレーム`);

    if (fmt === 'gif') {
      // ── GIF: 自前エンコーダー（外部依存なし）────────────────────────────
      const gifFps   = Math.min(fps, 50);          // GIF 実用上限 50fps
      const delayCs  = Math.max(2, Math.round(100 / gifFps));  // centiseconds
      const gifTotal = Math.round(dur * gifFps);

      setStatus('GIF パレット準備中...');
      await new Promise(r => setTimeout(r, 0));
      getGifLut();  // lazy LUT 構築（初回のみ ~50ms）

      const frames = [];
      (async () => {
        for (let f = 0; f < gifTotal; f++) {
          if (!exporting) return;
          drawNoise();
          // ぼかし有効時はキャンバスから読み直す（ぼかし後のピクセルを使う）
          const src = (blurChk.checked && blurOffscreen)
            ? ctx.getImageData(0, 0, imgW, imgH).data
            : outBuf;
          frames.push(quantizeToGif(src));
          progFill.style.width = ((f + 1) / gifTotal * 100).toFixed(1) + '%';
          setStatus(`GIF 録画中… ${f + 1} / ${gifTotal} フレーム`);
          if (f % 10 === 9) await new Promise(r => setTimeout(r, 0));
        }
        if (!exporting) return;
        setStatus('GIF エンコード中...');
        await new Promise(r => setTimeout(r, 0));
        const data = buildGIF(imgW, imgH, frames, delayCs);
        exporting = false;
        exportDone(new Blob([data], { type: 'image/gif' }), 'gif', gifFps, dur);
      })().catch(e => { stopAll(); setStatus('GIF エラー: ' + e.message); });

    } else {
      // ── WebM: MediaRecorder ───────────────────────────────────────────────
      const codecs = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm'];
      const mime   = codecs.find(m => { try { return MediaRecorder.isTypeSupported(m); } catch { return false; } }) || 'video/webm';

      const stream   = canvas.captureStream(fps);
      const recorder = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 12_000_000 });
      const chunks   = [];

      recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      recorder.onstop = () => {
        clearInterval(expInterval); expInterval = null;
        exporting = false;
        exportDone(new Blob(chunks, { type: mime.split(';')[0] }), 'webm', fps, dur);
      };
      recorder.onerror = () => { stopAll(); setStatus('録画中にエラーが発生しました。'); };

      recorder.start(200);
      let frame = 0;
      expInterval = setInterval(() => {
        if (!exporting) { clearInterval(expInterval); return; }
        drawNoise();
        frame++;
        progFill.style.width = (frame / total * 100).toFixed(1) + '%';
        setStatus(`WebM 録画中… ${frame} / ${total} フレーム  (${(frame / fps).toFixed(1)} 秒)`);
        if (frame >= total) { clearInterval(expInterval); expInterval = null; recorder.stop(); }
      }, 1000 / fps);
    }
  });

})();
</script>

  <img id="accessCounter" alt="アクセスカウンター" style="height:20px; vertical-align:middle; opacity:0; transition:opacity 0.3s;">
</footer>

    const img = document.getElementById('accessCounter');
    const pageUrl = encodeURIComponent('https://grid-noise-animator.vercel.app/index.html');
    img.src = 'https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=' + pageUrl
            + '&count_bg=%236c8ef5&title_bg=%2316161a&icon=&icon_color=%23dde0f0'
            + '&title=%E3%82%A2%E3%82%AF%E3%82%BB%E3%82%B9&edge_flat=true';

    img.onerror = () => { img.style.display = 'none'; };
  })();
</script>
